name: Build and deploy dotnet isolated project to Azure Function App - truckapp-functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './ArchiveOldOrders'
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish Function App
        shell: bash
        run: |
          pushd '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          dotnet publish ArchiveOldOrders.csproj --configuration Release --output ./output
          popd

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6F4D678AC1C142E3B555DE1ECA5F45D6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2CEA4D3EE5D741CC814DAEBEFC24D17A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_49958F79F301415487C30BE8B1CC998C }}

      - name: Inspect package
        shell: bash
        run: |
          find '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/output' -maxdepth 2 -type f | sort
          cat '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/output/functions.metadata' || true

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'truckapp-functions'
          package: '${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/output'
