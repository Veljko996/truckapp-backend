name: Build and deploy ASP.Net Core app to Azure Web App - SuinsTruckAppBackend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.x"

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Build solution
        run: dotnet build --configuration Release

      - name: Publish API
        run: dotnet publish WebApplication1/WebApplication1.csproj -c Release -o ${{ env.DOTNET_ROOT }}/myapp

      - name: Publish Functions
        run: dotnet publish ArchiveOldOrders/ArchiveOldOrders.csproj -c Release -o ${{ env.DOTNET_ROOT }}/functions

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.DOTNET_ROOT }}/myapp

      - name: Upload Functions artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-functions
          path: ${{ env.DOTNET_ROOT }}/functions

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8AA5F14456D74556A4AD4BBDD8AE4A72 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E09D39F9B3E64A9DB6D44926B8BC1DB7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AB1119F54BE146C29806244BBD2FE030 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "SuinsTruckAppBackend"
          slot-name: "Production"
          package: .

  deploy-functions:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download Functions artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-functions
          path: ./functions-package

      - name: Inspect functions package
        run: |
          find ./functions-package -maxdepth 3 -type f | sort
          cat ./functions-package/functions.metadata || true

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FUNC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E09D39F9B3E64A9DB6D44926B8BC1DB7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AB1119F54BE146C29806244BBD2FE030 }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'truckapp-functions'
          package: ./functions-package
          scm-do-build-during-deployment: false
